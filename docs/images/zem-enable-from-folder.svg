  <rect x="356" y="228" width="490" height="48" rx="8" fill="#f8fafc" stroke="#d5dae2"/>
  <text x="378" y="258" font-family="Arial, sans-serif" font-size="18" fill="#29313d">ToTape9.ZDL</text>
  <text x="690" y="258" font-family="Arial, sans-serif" font-size="15" fill="#596575">From Folder</text>
