<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Zoom Effect Manager Read Effects from Folder setting</title>
  <desc id="desc">Illustration showing Settings, Read Effects from folder, and selecting the repository dist folder.</desc>
  <rect width="960" height="540" fill="#f5f6f8"/>
  <rect x="38" y="36" width="884" height="468" rx="14" fill="#ffffff" stroke="#c7ccd4" stroke-width="2"/>
  <rect x="38" y="36" width="884" height="44" rx="14" fill="#20242b"/>
  <text x="64" y="64" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Zoom Effect Manager 2.3.3+</text>
  <rect x="54" y="96" width="852" height="48" fill="#edf1f5" stroke="#d5dae2"/>
  <text x="80" y="127" font-family="Arial, sans-serif" font-size="18" fill="#242933">File</text>
  <rect x="142" y="104" width="112" height="32" rx="6" fill="#dcecff" stroke="#4f8fd8" stroke-width="2"/>
  <text x="166" y="127" font-family="Arial, sans-serif" font-size="18" fill="#173f6b">Settings</text>
  <text x="288" y="127" font-family="Arial, sans-serif" font-size="18" fill="#242933">Device</text>
  <text x="376" y="127" font-family="Arial, sans-serif" font-size="18" fill="#242933">Help</text>
  <rect x="142" y="144" width="330" height="194" rx="8" fill="#ffffff" stroke="#aeb8c5" stroke-width="2"/>
  <text x="166" y="180" font-family="Arial, sans-serif" font-size="17" fill="#29313d">Language</text>
  <text x="166" y="218" font-family="Arial, sans-serif" font-size="17" fill="#29313d">Check for updates</text>
  <rect x="158" y="242" width="298" height="42" rx="6" fill="#2c7be5"/>
  <text x="178" y="269" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Read Effects from folder</text>
  <text x="166" y="316" font-family="Arial, sans-serif" font-size="17" fill="#29313d">Open log folder</text>
  <path d="M520 262h260" stroke="#2c7be5" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="585" y="190" width="260" height="144" rx="10" fill="#f7fbff" stroke="#2c7be5" stroke-width="2"/>
  <text x="610" y="226" font-family="Arial, sans-serif" font-size="18" fill="#173f6b">Select folder:</text>
  <rect x="610" y="246" width="210" height="36" rx="5" fill="#ffffff" stroke="#c7ccd4"/>
  <text x="626" y="270" font-family="Arial, sans-serif" font-size="16" fill="#29313d">ZoomMultistompZDL/dist</text>
  <text x="610" y="310" font-family="Arial, sans-serif" font-size="15" fill="#596575">This is the download folder.</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#2c7be5"/>
    </marker>
  </defs>
</svg>
